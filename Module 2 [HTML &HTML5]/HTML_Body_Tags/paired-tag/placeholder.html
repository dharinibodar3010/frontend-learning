<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
    <style>
        form{
            background-color: white;
            width: 90%;
            height: auto;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
        }
        fieldset{
            width: 40%;
            height: auto;
            margin: auto;
            /*border: 10px outset black;*/
            border: double 10px;
            /*border-radius: 20px; */
            border-radius: 45px 0px 45px 0px;
            /*border-image: url('https://png.pngtree.com/png-clipart/20220628/ourmid/pngtree-black-minimalist-border-png-image_5329495.png')  25 round; */
             /*border-image: url('https://i.pinimg.com/736x/6c/ce/63/6cce63ebadfb08764cd1c1555c3a8221.jpg')  65 round; */

             /*border-image: url('https://png.pngtree.com/png-clipart/20220628/ourmid/pngtree-black-minimalist-border-png-image_5329495.png')  25 repeat; */

        }
         legend{
            font-size: 40px;
            text-align: center;
            font-weight: bold;
        }
        ::placeholder
        {
            color: rgb(195, 98, 98);
            opacity: 1; /* Firefox */
        }
        input 
        {
            width: 100%;
            height: auto;
            padding: 10px;
        }
        input[type="submit"], input[type="reset"]
        {
            background-color: rgb(195, 98, 98);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 25%;
        }
         input[type="submit"]:hover, input[type="reset"]:hover
        {
            background-color: rgb(25, 23, 23);
        }
        </style>
</head>
<body>

    <div>
        <fieldset>
            <legend>Registration Form</legend>
        <form action="welcome.html" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your Name *" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your Email *" required><br><br>

            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your Password *" required><br><br>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your Phone *" required><br><br>


            <input type="submit" value="Submit">
            
            <input type="reset" value="Reset">
        </form>
</fieldset>
    </div>
    
</body>
</html>
